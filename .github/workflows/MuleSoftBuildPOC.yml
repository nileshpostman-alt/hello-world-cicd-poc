name: MuleSoft Build POC
on: [push] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'
          
      - name: Build with Maven
        run: mvn clean package -DskipTests
